<!DOCTYPE html>
<html lang="ko">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

  <meta http-equiv="Expires" content="0">
  
  <meta charset="UTF-8">

  <style>

      background: #f4f7f9;

  <img src="https://i.imgur.com/miucaBR.png" class="icon-preview"> <!-- ###이미지 주소 복사3/3 -->

  <div class="msg">

    <p class="step">브라우저 메뉴에서<br> '홈 화면에 추가'를 눌러주세요.</p>
    <p style="color: #999; font-size: 0.8rem; margin-top: 30px;">추가 완료 후에는 이 페이지를 닫고<br>생성된 아이콘으로 접속하시면 됩니다.</p>
  </div>
