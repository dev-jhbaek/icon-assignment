<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오늘의 표현</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="apple-touch-icon" href="https://i.imgur.com/miucaBR.png">
  <link rel="icon" href="https://i.imgur.com/miucaBR.png">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f7f9; }
    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }

    /* 로딩 화면 스타일 */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #f4f7f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999; /* iframe보다 위에 표시 */
      transition: opacity 0.5s ease; /* 사라질 때 부드럽게 */
    }

    /* 아이콘 이미지 애니메이션 (살짝 커졌다 작아졌다 하는 효과) */
    .loading-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    .loading-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>

  <div id="loader">
    <img src="https://i.imgur.com/miucaBR.png" class="loading-icon" alt="Loading Icon">
    <div class="loading-text">데이터를 불러오는 중...</div>
  </div>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbwIFZMmUDJ1AJL6qaHbr9pIi2XG_VeGr4VbXvk45GJ4HVolIrzVAi9al9FA0lNyYV9Rfg/exec"
    onload="hideLoader()">
  </iframe>

  <script>
    function hideLoader() {
      const loader = document.getElementById('loader');
      // 로딩 화면을 부드럽게 숨깁니다.
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
      }, 500);
    }
  </script>

</body>
</html>
