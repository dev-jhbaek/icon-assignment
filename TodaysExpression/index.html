<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오늘의 표현</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="apple-touch-icon" href="https://i.imgur.com/miucaBR.png">
  <link rel="icon" href="https://i.imgur.com/miucaBR.png">

  <style>
    /* 기본 레이아웃 */
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; 
      overflow: hidden; background-color: #f4f7f9; 
    }
    
    /* 구글 앱스 스크립트가 담길 창문 */
    iframe { 
      position: absolute; top: 0; left: 0; 
      width: 100%; height: 100%; border: none; z-index: 1; 
    }

    /* 로딩 화면 레이어 */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #f4f7f9;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; 
      transition: opacity 0.5s ease;
    }

    /* 아이콘 이미지 애니메이션 */
    .loading-icon {
      width: 90px;
      height: 90px;
      border-radius: 22px;
      margin-bottom: 20px;
      /* 구글 파란색 은은한 그림자 */
      box-shadow: 0 8px 25px rgba(66, 133, 244, 0.25);
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.9; }
    }

    /* 로딩 텍스트 스타일 */
    .loading-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 19px; /* 조금 더 크게 강조 */
      font-weight: 700;
      color: #4285F4; /* 구글 브랜드 블루 */
      margin-top: 10px;
      letter-spacing: -0.5px;
    }
  </style>
</head>
<body>

  <div id="loader">
    <img src="https://i.imgur.com/miucaBR.png" class="loading-icon" alt="App Icon">
    <div class="loading-text">데이터를 불러오고 있습니다.</div>
  </div>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbwIFZMmUDJ1AJL6qaHbr9pIi2XG_VeGr4VbXvk45GJ4HVolIrzVAi9al9FA0lNyYV9Rfg/exec"
    onload="hideLoader()">
  </iframe>

  <script>
    // iframe 로드가 완료되면 실행되는 함수
    function hideLoader() {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0'; // 부드럽게 투명해짐
      setTimeout(() => {
        loader.style.display = 'none'; // 완전히 제거
      }, 500);
    }
  </script>

</body>
</html>
